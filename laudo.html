<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VistorIA — Laudo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="logo completa 2.png" alt="VistorIA">
        <div class="header-usuario">
            <a href="historico.html" class="btn-ver">Meus Laudos</a>
            <span id="nome-usuario"></span>
            <button class="btn-logout" id="btn-logout">Sair</button>
        </div>
    </header>

    <main>
        <div class="historico-header">
            <h1 id="titulo-laudo">Carregando...</h1>
            <span id="data-laudo" style="color:#64748b; font-size:0.9rem"></span>
        </div>

        <div class="laudo-texto" id="laudo-texto"></div>

        <button class="btn-pdf" id="btn-pdf">📄 Baixar PDF</button>
    </main>

    <script>
        const token = localStorage.getItem('token')
        const nome  = localStorage.getItem('nome')

        if (!token) {
            window.location.href = 'login.html'
        }

        document.getElementById('nome-usuario').textContent = 'Olá, ' + nome
        document.getElementById('btn-logout').addEventListener('click', function() {
            localStorage.removeItem('token')
            localStorage.removeItem('nome')
            window.location.href = 'login.html'
        })

        // Pega o ID do laudo da URL
        const params  = new URLSearchParams(window.location.search)
        const laudoId = params.get('id')

        if (!laudoId) {
            window.location.href = 'historico.html'
        }

        // Carrega o laudo
        fetch(`http://127.0.0.1:5000/laudo/${laudoId}`, {
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(r => r.json())
        .then(function(dados) {
            if (dados.erro) {
                window.location.href = 'historico.html'
                return
            }

            document.getElementById('titulo-laudo').textContent = dados.endereco
            document.getElementById('laudo-texto').textContent  = dados.laudo
            document.getElementById('data-laudo').textContent   =
                new Date(dados.criado_em).toLocaleDateString('pt-BR', {
                    day: '2-digit', month: '2-digit', year: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                })

            // Botão PDF — abre janela de impressão
            document.getElementById('btn-pdf').addEventListener('click', function() {
                window.print()
            })
        })
        .catch(function() {
            window.location.href = 'historico.html'
        })
    </script>

</body>
</html>
